<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Pattern Ruler Calc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#c8c5be;min-height:100%;-webkit-tap-highlight-color:transparent;}
    button{-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    /* ── Math helpers ─────────────────────────────────── */
    const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));

    function parseNum(s) {
      const str = (s || "").trim();
      if (!str) return null;
      const neg = str.startsWith("-");
      const body = neg ? str.slice(1).trim() : str;
      let val = null;
      if (/^\d*\.?\d+$/.test(body)) val = parseFloat(body);
      else if (/^\d+\/\d+$/.test(body)) {
        const [n, d] = body.split("/").map(Number);
        val = d === 0 ? null : n / d;
      } else {
        const m = body.match(/^(\d+)\s+(\d+)\/(\d+)$/);
        if (m) {
          const [w, n, d] = m.slice(1).map(Number);
          val = d === 0 ? null : w + n / d;
        }
      }
      return val == null ? null : (neg ? -val : val);
    }

    function toT(v) { return v != null ? Math.round(v * 16) : null; }

    function fmtFrac(t) {
      if (t == null) return "—";
      if (t < 0) return `−${fmtFrac(-t)}`;
      const w = Math.floor(t / 16), r = t % 16;
      if (r === 0) return `${w}"`;
      const g = gcd(r, 16);
      return w > 0 ? `${w} ${r/g}/${16/g}"` : `${r/g}/${16/g}"`;
    }

    function fmtFracExpr(t) {
      if (t == null) return "";
      if (t < 0) return `−${fmtFracExpr(-t)}`;
      const w = Math.floor(t / 16), r = t % 16;
      if (r === 0) return `${w}`;
      const g = gcd(r, 16);
      return w > 0 ? `${w} ${r/g}/${16/g}` : `${r/g}/${16/g}`;
    }

    function calcOp(a, op, b) {
      if (a == null || b == null) return null;
      if (op === "+") return a + b;
      if (op === "−") return a - b;
      if (op === "×") return a * b;
      if (op === "÷") return b === 0 ? null : a / b;
      return null;
    }

    /* ── Visual fraction display ──────────────────────── */
    function splitTyped(raw) {
      const neg = raw.startsWith("-");
      const input = neg ? raw.slice(1) : raw;
      const prefix = neg ? "−" : "";
      if (input.includes(" ")) {
        const [wholeStr, rest = ""] = input.split(" ");
        if (rest.includes("/")) {
          const [num, den] = rest.split("/");
          return { whole: prefix + wholeStr, num, den, showFrac: true };
        }
        return { whole: prefix + wholeStr, num: rest, den: "", showFrac: true };
      }
      if (input.includes("/")) {
        const [num, den] = input.split("/");
        return { whole: prefix, num, den, showFrac: true };
      }
      return { whole: prefix + input, num: "", den: "", showFrac: false };
    }

    function TypedDisplay({ input, color }) {
      if (input.includes(".") || !input) return <span>{input || "0"}</span>;
      const { whole, num, den, showFrac } = splitTyped(input);
      if (!showFrac) return <span>{whole}</span>;
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
          {whole && <span>{whole}</span>}
          <span style={{ display:"inline-flex", flexDirection:"column", alignItems:"center", fontSize:"0.5em", lineHeight:1.1, fontWeight:700 }}>
            <span>{num || "·"}</span>
            <span style={{ width:"100%", height:1.5, background: color, margin:"2px 0" }}/>
            <span>{den || "·"}</span>
          </span>
        </span>
      );
    }

    /* ── Key component ────────────────────────────────── */
    function Key({ label, sub, onPress, dark, orange, muted }) {
      const [pressed, setPressed] = useState(false);
      const bg     = orange ? "#e8621a" : dark ? "#2a2a2a" : muted ? "#d8d5cf" : "#e2dfd9";
      const fg     = (dark || orange) ? "#f0ede8" : muted ? "#999" : "#1a1a1a";
      const shadow = pressed
        ? "inset 0 2px 5px rgba(0,0,0,0.35)"
        : orange ? "0 4px 0 #a84810"
        : dark    ? "0 4px 0 #111"
        : muted   ? "0 4px 0 #b0ada6"
        : "0 4px 0 #b5b2ab";
      return (
        <button
          onPointerDown={() => { setPressed(true); onPress(); }}
          onPointerUp={() => setPressed(false)}
          onPointerLeave={() => setPressed(false)}
          style={{
            borderRadius:8, border:"none", cursor:"pointer",
            background:bg, color:fg, boxShadow:shadow,
            transform: pressed ? "translateY(4px)" : "translateY(0)",
            transition:"transform 0.05s, box-shadow 0.05s",
            display:"flex", flexDirection:"column",
            alignItems:"center", justifyContent:"center",
            userSelect:"none", WebkitUserSelect:"none",
            touchAction:"manipulation", padding:0,
            height:"100%", minHeight:62, gap:2,
          }}
        >
          <span style={{ fontSize: label.length > 2 ? 14 : 22, fontWeight:700, fontFamily:"'DM Sans',sans-serif", lineHeight:1 }}>{label}</span>
          {sub && <span style={{ fontSize:8.5, opacity:0.5, fontWeight:600, letterSpacing:0.3, lineHeight:1 }}>{sub}</span>}
        </button>
      );
    }

    /* ── Main App ─────────────────────────────────────── */
    function App() {
      const [input,       setInput]       = useState("");
      const [firstVal,    setFirstVal]    = useState(null);
      const [op,          setOp]          = useState(null);
      const [justCalc,    setJustCalc]    = useState(false);
      const [history,     setHistory]     = useState([]);
      const [recalledExpr,setRecalledExpr]= useState(null);

      const inputVal = parseNum(input);
      const firstT   = toT(firstVal);
      const inputT   = toT(inputVal);
      const isTyping = input !== "";
      const displayVal = isTyping ? inputVal : firstVal;
      const displayT   = toT(displayVal);
      const exact = displayVal != null && Math.abs(displayVal * 16 - displayT) < 0.001;

      const exprParts = [];
      if (firstVal != null) exprParts.push(fmtFracExpr(firstT));
      if (op)               exprParts.push(op);
      if (input)            exprParts.push(input);
      const exprLine = recalledExpr ?? exprParts.join("  ");

      const clearRecall = () => setRecalledExpr(null);

      function pressDigit(d) {
        clearRecall();
        if (justCalc) { setInput(String(d)); setJustCalc(false); return; }
        setInput(v => v + String(d));
      }
      function pressDot() {
        clearRecall();
        if (justCalc) { setInput("0."); setJustCalc(false); return; }
        if (!input.includes(".")) setInput(v => (v || "0") + ".");
      }
      function pressSlash() {
        clearRecall();
        if (justCalc) { setInput(""); setJustCalc(false); return; }
        if (!input.includes("/")) setInput(v => v + "/");
      }
      function pressSpace() {
        clearRecall();
        if (justCalc) { setInput(""); setJustCalc(false); return; }
        if (input && !input.includes(" ") && !input.includes("/") && !input.includes(".")) {
          setInput(v => v + " ");
        }
      }
      function pressPlusMinus() {
        clearRecall();
        if (justCalc) { setFirstVal(v => v != null ? -v : v); setJustCalc(false); return; }
        if (input.startsWith("-")) { setInput(v => v.slice(1)); return; }
        if (input) { setInput(v => "-" + v); return; }
        setInput("-");
      }
      function pressOp(newOp) {
        clearRecall(); setJustCalc(false);
        if (firstVal != null && op && inputVal != null) {
          const res = calcOp(firstVal, op, inputVal);
          if (res != null) { setFirstVal(res); setInput(""); setOp(newOp); return; }
        }
        if (inputVal != null) { setFirstVal(inputVal); setInput(""); setOp(newOp); }
        else if (firstVal != null) { setOp(newOp); }
      }
      function pressEquals() {
        if (firstVal == null || op == null || inputVal == null) return;
        const res = calcOp(firstVal, op, inputVal);
        if (res == null) return;
        const rT  = toT(res);
        const isEx = Math.abs(res * 16 - rT) < 0.001;
        setHistory(h => [{
          expr: `${fmtFracExpr(firstT)} ${op} ${fmtFracExpr(inputT)}`,
          result: fmtFrac(rT), resultVal: res,
          cm: (rT / 16 * 2.54).toFixed(2),
          exact: isEx, id: Date.now(),
        }, ...h].slice(0, 3));
        setFirstVal(res); setInput(""); setOp(null); setJustCalc(true);
      }
      function pressAC() {
        clearRecall(); setInput(""); setFirstVal(null); setOp(null); setJustCalc(false);
      }
      function pressBack() {
        clearRecall(); setJustCalc(false);
        if (input === "" && op != null) { setOp(null); return; }
        if (input === "" && op == null && firstVal != null) { setFirstVal(null); return; }
        setInput(v => v.slice(0, -1));
      }
      function recallHistory(h) {
        setInput(""); setOp(null);
        setFirstVal(h.resultVal); setJustCalc(true);
        setRecalledExpr(h.expr);
      }

      return (
        <div style={{ minHeight:"100vh", background:"#c8c5be", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"24px 10px 48px", fontFamily:"'DM Sans',sans-serif" }}>
          <div style={{ width:"100%", maxWidth:400, background:"#f0ede8", borderRadius:20, boxShadow:"inset 0 1px 0 rgba(255,255,255,0.85), 0 20px 60px rgba(0,0,0,0.28), 0 2px 0 #a8a5a0" }}>

            {/* Header */}
            <div style={{ padding:"12px 18px 8px", display:"flex", justifyContent:"space-between" }}>
              <div style={{ fontSize:7.5, color:"#aaa", fontWeight:700, letterSpacing:3 }}>PATTERN RULER CALC</div>
              <div style={{ fontSize:7.5, color:"#ccc", fontWeight:600, letterSpacing:2 }}>1⁄16″</div>
            </div>

            {/* LCD */}
            <div style={{ margin:"0 12px 14px", background:"#dad7d0", borderRadius:10, padding:"14px 16px", height:138, border:"1px solid #c4c1b9", boxShadow:"inset 0 2px 5px rgba(0,0,0,0.08)", display:"flex", flexDirection:"column", justifyContent:"space-between" }}>
              <div style={{ fontSize:15, color:"#888", fontWeight:600, fontFamily:"'DM Mono',monospace", textAlign:"right", lineHeight:1.2 }}>
                {exprLine || "\u00A0"}
              </div>
              <div style={{ textAlign:"right" }}>
                <span style={{ fontSize:36, fontWeight:700, color:"#1a1a1a", fontFamily:"'DM Mono',monospace", letterSpacing:-0.5, lineHeight:1 }}>
                  {isTyping
                    ? <TypedDisplay input={input} color="#1a1a1a"/>
                    : firstVal != null
                      ? (justCalc ? fmtFrac(firstT) : (op ? `${fmtFracExpr(firstT)} ${op}` : fmtFracExpr(firstT)))
                      : "0"}
                </span>
              </div>
              <div style={{ display:"flex", justifyContent:"flex-end", gap:12 }}>
                {(displayVal != null && !exact) && <span style={{ fontSize:9.5, color:"#c44f12", fontWeight:700 }}>≈</span>}
                <span style={{ fontSize:10.5, color: displayVal != null ? "#777" : "transparent", fontWeight:600, fontFamily:"'DM Mono',monospace" }}>
                  {displayVal != null ? (displayT/16).toFixed(3)+"″" : "0.000″"}
                </span>
                <span style={{ fontSize:10.5, color: displayVal != null ? "#555" : "transparent", fontWeight:700, fontFamily:"'DM Mono',monospace" }}>
                  {displayVal != null ? (displayT/16*2.54).toFixed(2)+" cm" : "0.00 cm"}
                </span>
              </div>
            </div>

            {/* Keypad */}
            <div style={{ padding:"0 12px 14px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gridAutoRows:"62px", gap:7 }}>
                <Key label="⌫"  dark  onPress={pressBack}/>
                <Key label="AC" dark  onPress={pressAC}/>
                <Key label="±"  sub="sign" muted onPress={pressPlusMinus}/>
                <Key label="÷"  dark  onPress={() => pressOp("÷")}/>
                <Key label="7"  onPress={() => pressDigit(7)}/>
                <Key label="8"  onPress={() => pressDigit(8)}/>
                <Key label="9"  onPress={() => pressDigit(9)}/>
                <Key label="×"  dark  onPress={() => pressOp("×")}/>
                <Key label="4"  onPress={() => pressDigit(4)}/>
                <Key label="5"  onPress={() => pressDigit(5)}/>
                <Key label="6"  onPress={() => pressDigit(6)}/>
                <Key label="−"  dark  onPress={() => pressOp("−")}/>
                <Key label="1"  onPress={() => pressDigit(1)}/>
                <Key label="2"  onPress={() => pressDigit(2)}/>
                <Key label="3"  onPress={() => pressDigit(3)}/>
                <Key label="+"  dark  onPress={() => pressOp("+")}/>
                <Key label="."  sub="decimal"  onPress={pressDot}/>
                <Key label="0"  onPress={() => pressDigit(0)}/>
                <Key label="/"  sub="fraction" onPress={pressSlash}/>
                <Key label="="  orange onPress={pressEquals}/>
              </div>
              <div style={{ marginTop:7 }}>
                <button onPointerDown={pressSpace} style={{ width:"100%", height:52, borderRadius:8, border:"none", background:"#d8d5cf", boxShadow:"0 4px 0 #b0ada6", color:"#888", fontSize:12, fontWeight:700, cursor:"pointer", letterSpacing:4, touchAction:"manipulation" }}>
                  SPACE
                </button>
              </div>
            </div>

            {/* History */}
            {history.length > 0 && (
              <div style={{ borderTop:"1px solid #c8c4bc", padding:"12px 12px 16px", background:"#eae7e1", borderRadius:"0 0 20px 20px" }}>
                <div style={{ fontSize:7.5, color:"#aaa", fontWeight:700, letterSpacing:2.5, marginBottom:9 }}>HISTORY · TAP TO RECALL</div>
                <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                  {history.map((h, i) => (
                    <button key={h.id} onClick={() => recallHistory(h)} style={{ display:"flex", alignItems:"center", padding:"8px 10px", background:"#f0ede8", borderRadius:6, border:"1px solid #ddd9d2", opacity: Math.max(0.5, 1-i*0.15), gap:8, cursor:"pointer", width:"100%", textAlign:"left", touchAction:"manipulation" }}>
                      <span style={{ fontSize:11, color:"#666", fontFamily:"'DM Mono',monospace", flex:1 }}>{h.expr}</span>
                      <span style={{ fontSize:9, color:"#bbb" }}>=</span>
                      <span style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", fontFamily:"'DM Mono',monospace" }}>{h.result}</span>
                      <span style={{ fontSize:10, color:"#888", fontFamily:"'DM Mono',monospace" }}>{h.cm}cm</span>
                      {!h.exact && <span style={{ fontSize:9, color:"#e8621a", fontWeight:700 }}>≈</span>}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {history.length === 0 && (
              <div style={{ padding:"6px 0 12px", display:"flex", gap:3, justifyContent:"center" }}>
                {Array.from({length:14},(_,i)=><div key={i} style={{ width:14, height:3, background:"#dddad4", borderRadius:2 }}/>)}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
